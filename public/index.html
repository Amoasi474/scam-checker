<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scam Checker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <h1>Scam Checker</h1>
    <p>Paste a website and check basic risk signals.</p>

    <div class="card">
      <input id="domainInput" type="text" placeholder="Enter domain e.g. heinekenapp.top" />
      <button id="checkBtn">Check</button>
    </div>

    <section id="result" class="result hidden"></section>
  </main>

  <script src="app.js"></script>
</body>
</html>
